<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Penguin List</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bungee&family=Mali:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/app.css">
</head>
<body>
    <div class="frost frost-left"></div>
    <div class="frost frost-right"></div>

    <main class="shell">
        <section class="hero">
            <div class="hero-copy">
                <p class="eyebrow">Penguin List</p>
                <h1 id="hero-title">Your todo app is back.</h1>
                <p id="hero-subtitle" class="subtitle">Use the web app at the root. Hit <code>/api</code> when you want the same data as JSON.</p>
                <div class="hero-actions">
                    <a class="api-link" href="/api" target="_blank" rel="noreferrer">Open API</a>
                    <span class="status-pill" id="summary-pill">Loading</span>
                </div>
            </div>
            <div class="hero-art">
                <img id="penguin-art" src="/assets/gunther-suit.png" alt="Penguin mascot">
            </div>
        </section>

        <section class="board">
            <header class="board-top">
                <nav class="day-tabs" aria-label="Todo day navigation">
                    <button class="day-tab" data-day="yesterday">Yesterday</button>
                    <button class="day-tab" data-day="today">Today</button>
                    <button class="day-tab" data-day="tomorrow">Tomorrow</button>
                </nav>
                <div class="board-heading">
                    <h2 id="day-title">Today</h2>
                    <p id="day-meta">Pending 0, done 0</p>
                </div>
            </header>

            <section class="composer">
                <form id="todo-form">
                    <label class="field">
                        <span>Task title</span>
                        <input id="title-input" name="title" type="text" maxlength="120" placeholder="Macro title of the task (Homework,Groceries...)" required>
                    </label>

                    <div class="field">
                        <div class="field-head">
                            <span>Descriptions</span>
                            <button id="add-description" type="button" class="ghost-btn">Add line</button>
                        </div>
                        <div id="description-list" class="description-list"></div>
                    </div>

                    <div class="composer-actions">
                        <button type="submit" class="primary-btn">Add task</button>
                        <p id="form-message" class="form-message" aria-live="polite"></p>
                    </div>
                </form>
            </section>

            <section class="columns">
                <article class="panel">
                    <header class="panel-head">
                        <h3>Pending</h3>
                        <span id="pending-count" class="panel-count">0</span>
                    </header>
                    <div id="pending-list" class="task-list"></div>
                </article>

                <article class="panel panel-done">
                    <header class="panel-head">
                        <h3>Done</h3>
                        <span id="done-count" class="panel-count">0</span>
                    </header>
                    <div id="done-list" class="task-list"></div>
                </article>
            </section>
        </section>
    </main>

    <template id="task-template">
        <article class="task-card">
            <div class="task-card-top">
                <label class="task-toggle">
                    <input type="checkbox" class="todo-checkbox">
                    <span class="checkmark"></span>
                </label>
                <div class="task-copy">
                    <h4 class="task-title"></h4>
                    <ul class="task-descriptions"></ul>
                </div>
                <button type="button" class="delete-btn" aria-label="Delete task">Delete</button>
            </div>
        </article>
    </template>

    <script src="/app.js" type="module"></script>
</body>
</html>
